<!DOCTYPE html>
<html>
<head>
<title>Car Dodge Game - Realistic Cars & Road</title>


<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
    font-family: Arial;
}

#gameArea {
    width: 100vw;
    height: 100vh; 
    background: #27ae60; /* green grass on sides */
    margin: auto;
    position: relative;
    overflow: hidden;
    border: 8px solid #222;
    box-shadow: 0 0 30px rgba(0,0,0,0.9);
}

/* Realistic scrolling road (self-contained, no external files) */
#road {
    position: absolute;
    width: 80%;               /* road narrower than screen */
    height: 200%;
    left: 10%;
    top: -600px;
    background-color: #2c3e50; /* asphalt */
    background-image: 
        repeating-linear-gradient(
            to bottom,
            #2c3e50 0px,
            #2c3e50 45px,
            #34495e 45px,
            #34495e 90px
        ), /* road texture */
        repeating-linear-gradient(
            to bottom,
            transparent 0px,
            transparent 55px,
            #ecf0f1 55px,
            #ecf0f1 65px
        ); /* white dashed lane lines */
    background-size: 100% 100%, 100% 120px;
    animation: scrollRoad 1.1s linear infinite;
    z-index: 1;
    pointer-events: none;
}

@keyframes scrollRoad {
    from { transform: translateY(0); }
    to   { transform: translateY(600px); }
}

#player {
    width: 50px;
    height: 90px;
    background: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2290%22 viewBox=%220 0 50 90%22%3E%3Crect x=%225%22 y=%2210%22 width=%2240%22 height=%2265%22 rx=%228%22 fill=%22%23e74c3c%22 stroke=%22%2326334a%22 stroke-width=%224%22/%3E%3Crect x=%2212%22 y=%2222%22 width=%2226%22 height=%2225%22 rx=%224%22 fill=%22%231e2a44%22/%3E%3Crect x=%2215%22 y=%2250%22 width=%2220%22 height=%2212%22 fill=%22%231e2a44%22/%3E%3Ccircle cx=%2213%22 cy=%2220%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2237%22 cy=%2220%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2213%22 cy=%2270%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2237%22 cy=%2270%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2213%22 cy=%2220%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2237%22 cy=%2220%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2213%22 cy=%2270%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2237%22 cy=%2270%22 r=%223%22 fill=%22%23ddd%22/%3E%3C/svg%3E') no-repeat center/contain;
    position: absolute;
    bottom: 20px;
    left: 175px;
    z-index: 5;
    transition: transform 0.1s;
}

.enemy {
    width: 50px;
    height: 90px;
    background: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2290%22 viewBox=%220 0 50 90%22%3E%3Crect x=%225%22 y=%2210%22 width=%2240%22 height=%2265%22 rx=%228%22 fill=%22%233498db%22 stroke=%22%2326334a%22 stroke-width=%224%22/%3E%3Crect x=%2212%22 y=%2222%22 width=%2226%22 height=%2225%22 rx=%224%22 fill=%22%231e2a44%22/%3E%3Crect x=%2215%22 y=%2250%22 width=%2220%22 height=%2212%22 fill=%22%231e2a44%22/%3E%3Ccircle cx=%2213%22 cy=%2220%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2237%22 cy=%2220%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2213%22 cy=%2270%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2237%22 cy=%2270%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2213%22 cy=%2220%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2237%22 cy=%2220%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2213%22 cy=%2270%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2237%22 cy=%2270%22 r=%223%22 fill=%22%23ddd%22/%3E%3C/svg%3E') no-repeat center/contain;
    position: absolute;
    top: -100px;
    z-index: 2;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    z-index: 10;
}

#gameOver {
    position: absolute;
    top: 250px;
    width: 100%;
    text-align: center;
    color: #ff4444;
    font-size: 36px;
    text-shadow: 3px 3px 8px #000;
    display: none;
    z-index: 20;
}

button {
    padding: 12px 30px;
    font-size: 20px;
    margin-top: 15px;
    cursor: pointer;
    background: #333;
    color: white;
    border: 3px solid #fff;
    border-radius: 8px;
}
</style>
</head>

<body>



<div id="gameArea">

<div id="road"></div>

<div id="score">Score: 0</div>

<div id="player"></div>

<div id="gameOver">
Game Over<br>
<button onclick="restart()">Restart</button>
</div>

</div>

<script>
/* === EXACT SAME LOGIC AS YOUR ORIGINAL GAME (no changes) === */
const player=document.getElementById("player");
const gameArea=document.getElementById("gameArea");
const scoreBox=document.getElementById("score");
const gameOverBox=document.getElementById("gameOver");



let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let oscillator = null;
let gainNode = null;

document.addEventListener("keydown", () => {
    if(audioCtx.state === "suspended"){
        audioCtx.resume();
    }
});



let keys={};
let enemies=[];
let score=0;
let speed=5;
let playing=true;

let isFlying=false;
let flyHeight=0;
let flyDirection=1;

document.addEventListener("keydown",e=>{

keys[e.keyCode]=true;

if(e.keyCode===38 && !isFlying){
isFlying=true;
flyHeight=0;
flyDirection=1;
}

});

document.addEventListener("keyup",e=>{
keys[e.keyCode]=false;
});

function movePlayer(){

let x=player.offsetLeft;

/* detect movement */
let moving = false;

if(keys[37] && x>0){
player.style.left=x-6+"px";
moving = true;
}

if(keys[39] && x < (gameArea.offsetWidth - 60)){
player.style.left=x+6+"px";
moving = true;
}

/* PLAY SOUND */
startEngineSound();
if(oscillator){
    if(moving){
        oscillator.frequency.value = 180; // turning → higher pitch
    }else{
        oscillator.frequency.value = 120; // normal driving
    }
}

if(isFlying){

player.style.zIndex = 20;

flyHeight += flyDirection * 4;

if(flyHeight>120){
flyDirection=-1;
}

if(flyHeight<=0){
flyHeight=0;
isFlying=false;
player.style.zIndex = 5;
}

player.style.transform="translateY(-"+flyHeight+"px) scale(1.1)";

}
}

function createEnemy(){

let enemy=document.createElement("div");
enemy.classList.add("enemy");

/* road boundaries */
let roadWidth = gameArea.offsetWidth * 0.8;
let roadLeft = gameArea.offsetWidth * 0.1;

/* random position anywhere on road */
let randomX = roadLeft + Math.random() * (roadWidth - 50);

enemy.style.left = randomX + "px";

enemy.y = -100;

gameArea.appendChild(enemy);
enemies.push(enemy);
}

function moveEnemies(){

for(let i=0;i<enemies.length;i++){

let e=enemies[i];

e.y += speed;
e.style.top=e.y+"px";

let roadWidth = gameArea.offsetWidth * 0.8;
let roadLeft = gameArea.offsetWidth * 0.1;

let newLeft = e.offsetLeft + (Math.random() - 0.5) * 1

/* keep inside road */
if(newLeft > roadLeft && newLeft < roadLeft + roadWidth - 50){
    e.style.left = newLeft + "px";
}

if(!isFlying && collision(player,e)){
endGame();
}

if(e.y > gameArea.offsetHeight){
e.remove();
enemies.splice(i,1);
score++;
}

}

}

function collision(a,b){

let aRect=a.getBoundingClientRect();
let bRect=b.getBoundingClientRect();

/* shrink hitbox slightly */
let margin = 10;

return !(
aRect.bottom - margin < bRect.top ||
aRect.top + margin > bRect.bottom ||
aRect.right - margin < bRect.left ||
aRect.left + margin > bRect.right
);

}

function startEngineSound(){

    if(oscillator) return;

    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();

    oscillator.type = "sawtooth"; // engine-like sound
    oscillator.frequency.value = 120;

    gainNode.gain.value = 0.1;

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
}

function stopEngineSound(){
    if(oscillator){
        oscillator.stop();
        oscillator = null;
    }
}

function gameLoop(){

if(!playing) return;

movePlayer();
moveEnemies();

scoreBox.innerText="Score: "+score;

let spawnRate = 0.05 + score * 0.0005;

if(Math.random() < spawnRate){
    createEnemy();
}

requestAnimationFrame(gameLoop);
}

function endGame(){

playing=false;
gameOverBox.style.display="block";

}

function restart(){

location.reload();

}

gameLoop();
</script>

</body>
</html>
