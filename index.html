<!DOCTYPE html>
<html>
<head>
    <title>Car Dodge Game</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            overflow: hidden;
            font-family: Arial;
            touch-action: none; /* Prevents scrolling/zooming */
        }

        #gameArea {
            width: 100vw;
            height: 100vh;
            background: #27ae60;
            position: relative;
            overflow: hidden;
            border: none; /* Remove border on mobile */
            box-shadow: none;
            margin: 0;
        }

/* Realistic scrolling road (self-contained, no external files) */
#road {
    position: absolute;
    width: 80%;
    height: 300%;           /* Increased for better scrolling feel */
    left: 10%;
    top: -800px;
    background-color: #2c3e50;
    background-image: 
        repeating-linear-gradient(to bottom, #2c3e50 0px, #2c3e50 45px, #34495e 45px, #34495e 90px),
        repeating-linear-gradient(to bottom, transparent 0px, transparent 55px, #ecf0f1 55px, #ecf0f1 65px);
    background-size: 100% 100%, 100% 120px;
    animation: scrollRoad 0.9s linear infinite;
    z-index: 1;
}

@keyframes scrollRoad {
    from { transform: translateY(0); }
    to   { transform: translateY(800px); }
}

#player {
    width: 55px;
    height: 100px;
    background: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2290%22 viewBox=%220 0 50 90%22%3E%3Crect x=%225%22 y=%2210%22 width=%2240%22 height=%2265%22 rx=%228%22 fill=%22%23e74c3c%22 stroke=%22%2326334a%22 stroke-width=%224%22/%3E%3Crect x=%2212%22 y=%2222%22 width=%2226%22 height=%2225%22 rx=%224%22 fill=%22%231e2a44%22/%3E%3Crect x=%2215%22 y=%2250%22 width=%2220%22 height=%2212%22 fill=%22%231e2a44%22/%3E%3Ccircle cx=%2213%22 cy=%2220%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2237%22 cy=%2220%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2213%22 cy=%2270%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2237%22 cy=%2270%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2213%22 cy=%2220%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2237%22 cy=%2220%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2213%22 cy=%2270%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2237%22 cy=%2270%22 r=%223%22 fill=%22%23ddd%22/%3E%3C/svg%3E') no-repeat center/contain;
    position: absolute;
    bottom: 80px;           /* ← Increased from 20px so car is visible */
    left: 40%;
    z-index: 5;
    transition: left 0.08s linear;
}

.enemy {
    width: 50px;
    height: 90px;
    background: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2290%22 viewBox=%220 0 50 90%22%3E%3Crect x=%225%22 y=%2210%22 width=%2240%22 height=%2265%22 rx=%228%22 fill=%22%233498db%22 stroke=%22%2326334a%22 stroke-width=%224%22/%3E%3Crect x=%2212%22 y=%2222%22 width=%2226%22 height=%2225%22 rx=%224%22 fill=%22%231e2a44%22/%3E%3Crect x=%2215%22 y=%2250%22 width=%2220%22 height=%2212%22 fill=%22%231e2a44%22/%3E%3Ccircle cx=%2213%22 cy=%2220%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2237%22 cy=%2220%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2213%22 cy=%2270%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2237%22 cy=%2270%22 r=%226.5%22 fill=%22%23111%22/%3E%3Ccircle cx=%2213%22 cy=%2220%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2237%22 cy=%2220%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2213%22 cy=%2270%22 r=%223%22 fill=%22%23ddd%22/%3E%3Ccircle cx=%2237%22 cy=%2270%22 r=%223%22 fill=%22%23ddd%22/%3E%3C/svg%3E') no-repeat center/contain;
    position: absolute;
    top: -100px;
    z-index: 2;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    z-index: 10;
}

#gameOver {
    position: absolute;
    top: 250px;
    width: 100%;
    text-align: center;
    color: #ff4444;
    font-size: 36px;
    text-shadow: 3px 3px 8px #000;
    display: none;
    z-index: 20;
}

button {
    padding: 12px 30px;
    font-size: 20px;
    margin-top: 15px;
    cursor: pointer;
    background: #333;
    color: white;
    border: 3px solid #fff;
    border-radius: 8px;
}

/* Mobile Jump Button - Visible only on smartphones */
#btn-jump {
    position: absolute;
    bottom: 30px;
    right: 15%;
    width: 75px;
    height: 75px;
    background: rgba(255,255,255,0.25);
    border: 5px solid white;
    color: white;
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    z-index: 50;
    user-select: none;
    touch-action: manipulation;
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

/* Hide Jump button on Desktop */
@media (min-width: 1024px) {
    #btn-jump {
        display: none;
    }
}
</style>
</head>

<body>



<div id="gameArea">

    <div id="road"></div>
    <div id="score">Score: 0</div>
    <div id="player"></div>

    <!-- Jump Button for Mobile -->
    <button id="btn-jump">↑</button>

    <div id="gameOver">
        Game Over<br>
        <button onclick="restart()">Restart</button>
    </div>

</div>

<script>
// Force audio on mobile
document.addEventListener("touchstart", () => {
    if (audioCtx.state === "suspended") audioCtx.resume();
}, { once: true });

const player = document.getElementById("player");
const gameArea = document.getElementById("gameArea");
const scoreBox = document.getElementById("score");
const gameOverBox = document.getElementById("gameOver");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let oscillator = null;
let gainNode = null;

let keys = {};
let enemies = [];
let score = 0;
let speed = 5;
let playing = true;

let isFlying = false;
let flyHeight = 0;
let flyDirection = 1;

// Initialize player position in pixels
player.style.left = (gameArea.offsetWidth * 0.4) + "px";

// Keyboard Controls
document.addEventListener("keydown", e => {
    keys[e.keyCode] = true;
    if (e.keyCode === 38 && !isFlying) {  // Up Arrow = Fly
        isFlying = true;
        flyHeight = 0;
        flyDirection = 1;
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
});

document.addEventListener("keyup", e => {
    keys[e.keyCode] = false;
});

// ===================== TOUCH CONTROLS =====================
let touchStartX = 0;

gameArea.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
});

gameArea.addEventListener("touchmove", e => {
    let touchX = e.changedTouches[0].screenX;
    let diff = touchStartX - touchX;
    let currentLeft = parseFloat(player.style.left);

    if (diff > 30) {           // Swipe Left
        player.style.left = Math.max(60, currentLeft - 22) + "px";
        touchStartX = touchX;
    } 
    else if (diff < -30) {     // Swipe Right
        player.style.left = Math.min(gameArea.offsetWidth - 120, currentLeft + 22) + "px";
        touchStartX = touchX;
    }
});

// Engine Sound
function startEngineSound() {
    if (oscillator) return;
    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    oscillator.type = "sawtooth";
    oscillator.frequency.value = 130;
    gainNode.gain.value = 0.12;
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
}

function movePlayer() {
    let x = parseFloat(player.style.left);

    // Keyboard Movement
    if (keys[37] && x > 60) {                    // Left
        player.style.left = (x - 9) + "px";
    }
    if (keys[39] && x < gameArea.offsetWidth - 120) {  // Right
        player.style.left = (x + 9) + "px";
    }

    startEngineSound();   // Start sound when moving

    // Flying
    if (isFlying) {
        player.style.zIndex = 20;
        flyHeight += flyDirection * 5;
        if (flyHeight > 140) flyDirection = -1;
        if (flyHeight <= 0) {
            flyHeight = 0;
            isFlying = false;
            player.style.zIndex = 5;
        }
        player.style.transform = `translateY(-${flyHeight}px) scale(1.1)`;
    }
}

function createEnemy() {
    let enemy = document.createElement("div");
    enemy.classList.add("enemy");

    let roadWidth = gameArea.offsetWidth * 0.8;
    let roadLeft = gameArea.offsetWidth * 0.1;
    let randomX = roadLeft + Math.random() * (roadWidth - 55);

    enemy.style.left = randomX + "px";
    enemy.y = -110;
    enemy.style.top = "-110px";

    gameArea.appendChild(enemy);
    enemies.push(enemy);
}

function moveEnemies() {
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        
        e.y += speed;
        e.style.top = e.y + "px";

        // === REDUCED SHAKING ===
        // Only slight movement, not every frame
        if (Math.random() < 0.4) {
            let currentLeft = parseFloat(e.style.left);
            let newLeft = currentLeft + (Math.random() - 0.5) * 2.2;
            
            let roadLeft = gameArea.offsetWidth * 0.1;
            let roadRight = roadLeft + gameArea.offsetWidth * 0.8 - 55;
            
            if (newLeft > roadLeft + 15 && newLeft < roadRight) {
                e.style.left = newLeft + "px";
            }
        }

        if (!isFlying && collision(player, e)) {
            endGame();
        }

        if (e.y > gameArea.offsetHeight + 100) {
            e.remove();
            enemies.splice(i, 1);
            score += 10;
        }
    }
}

function collision(a, b) {
    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();
    let margin = 12;
    return !(
        aRect.bottom - margin < bRect.top ||
        aRect.top + margin > bRect.bottom ||
        aRect.right - margin < bRect.left ||
        aRect.left + margin > bRect.right
    );
}

// ===================== MOBILE JUMP BUTTON =====================
const btnJump = document.getElementById("btn-jump");

btnJump.addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (!isFlying) {
        isFlying = true;
        flyHeight = 0;
        flyDirection = 1;
    }
});

btnJump.addEventListener("touchend", (e) => {
    e.preventDefault();
});

function gameLoop() {
    if (!playing) return;

    movePlayer();
    moveEnemies();

    scoreBox.innerText = "Score: " + score;

    // === LOWER DENSITY ===
    let spawnRate = 0.018 + (score * 0.00018);   // Much better balance

    if (Math.random() < spawnRate) {
        createEnemy();
    }

    requestAnimationFrame(gameLoop);
}

function endGame() {
    playing = false;
    gameOverBox.style.display = "block";
    if (oscillator) oscillator.stop();
}

function restart() {
    location.reload();
}

// Start the game
gameLoop();
</script>

</body>
</html>
